<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>工事行事予定表 v4 ｜ 情報ホワイトボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif; background:#c0c0b8; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:10px; gap:8px; }
.toolbar { width:100%; max-width:1480px; display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(255,255,255,0.88); border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.12); flex-wrap:wrap; }
.nav-group{display:flex;align-items:center;gap:6px;}
.nav-btn{width:44px;height:44px;border-radius:50%;border:2px solid #bbb;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;transition:all 0.15s;}
.nav-btn:hover{border-color:#1565c0;color:#1565c0;}
.nav-btn:active{background:#e8f0ff;border-color:#1565c0;}
.period-label{font-size:18px;font-weight:900;color:#111;min-width:220px;text-align:center;}
.view-toggle{display:flex;border:2px solid #1565c0;border-radius:7px;overflow:hidden;}
.vt{padding:9px 18px;border:none;border-right:1px solid #1565c0;background:#fff;font-family:inherit;font-size:14px;font-weight:700;color:#1565c0;cursor:pointer;transition:all 0.12s;min-height:44px;}
.vt:last-child{border-right:none;}
.vt.active{background:#1565c0;color:#fff;}
.vt:hover:not(.active){background:#e8f0ff;}
.kt-badge{display:flex;align-items:center;gap:5px;background:#fff8e1;border:2px solid #ffb300;padding:5px 13px;border-radius:14px;font-size:12px;font-weight:700;color:#e65100;}
.legend{display:flex;align-items:center;gap:10px;font-size:11px;color:#555;font-weight:600;}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:10px;height:10px;border-radius:50%;}
.filter-pills{display:flex;gap:4px;margin-left:auto;}
.pill{padding:8px 16px;border-radius:10px;border:2px solid #ccc;background:#fff;font-family:inherit;font-size:13px;font-weight:700;color:#888;cursor:pointer;transition:all 0.15s;min-height:40px;}
.pill:hover{border-color:#1565c0;color:#1565c0;}
.pill.active{border-color:#1565c0;background:#1565c0;color:#fff;}
.pill:active{transform:scale(0.96);}
.clock{font-size:12px;color:#777;font-weight:500;white-space:nowrap;}

/* Whiteboard */
.wb-outer{width:100%;max-width:1480px;background:linear-gradient(160deg,#dcdee0 0%,#b8babc 40%,#c4c6c8 55%,#d8dadc 100%);border-radius:8px;padding:14px 14px 30px;box-shadow:0 14px 44px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -1px 0 rgba(0,0,0,0.15);position:relative;}
.wb-clip{position:absolute;top:5px;width:20px;height:24px;background:linear-gradient(180deg,#b8babc 0%,#8a8c8e 100%);border-radius:3px;box-shadow:0 2px 5px rgba(0,0,0,0.38);}
.wb-clip-l{left:22%;} .wb-clip-r{right:22%;}
.wb-tray{position:absolute;bottom:8px;left:14px;right:14px;height:18px;background:linear-gradient(180deg,#a8aaac 0%,#888a8c 50%,#9e9ea0 100%);border-radius:3px;display:flex;align-items:center;gap:6px;padding:0 10px;}
.wb-pen{width:34px;height:11px;border-radius:5px;}
.pen-blue{background:#1565c0;}.pen-red{background:#c62828;}.pen-grn{background:#2e7d32;}.pen-blk{background:#333;}
.wb-eraser{width:42px;height:11px;border-radius:2px;background:#e8e0c8;margin-left:auto;}
.wb-board{background:linear-gradient(135deg,#fafaf4 0%,#f6f6f0 50%,#f8f8f2 100%);border-radius:3px;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,0.03);}
.wb-layout{display:flex;}
.wb-title{writing-mode:vertical-rl;text-orientation:upright;font-size:20px;font-weight:900;color:#111;padding:24px 7px;border-right:2.5px solid #222;letter-spacing:0.22em;display:flex;align-items:center;justify-content:center;min-width:48px;flex-shrink:0;background:rgba(234,232,220,0.7);}
.wb-grid-area{flex:1;min-width:0;display:flex;flex-direction:column;}

/* Grid header */
.wb-header,.wb-subheader,.wb-row{display:grid;}
.wb-header{border-bottom:2.5px solid #111;background:rgba(228,226,214,0.85);}
.wb-subheader{border-bottom:1.5px solid #666;background:rgba(234,232,220,0.65);}
.hc{padding:6px 2px;text-align:center;font-weight:900;font-size:13px;color:#111;border-right:1px solid rgba(150,110,50,0.3);overflow:hidden;white-space:nowrap;}
.hc:last-child{border-right:none;}
.hc.biko{grid-column:-3/-2;border-left:2.5px solid #333;font-size:14px;}
.hc.ko{grid-column:-2/-1;font-size:14px;}
.hc.sun{color:#c62828;} .hc.sat{color:#1565c0;}
.hc.today-hc{background:rgba(230,81,0,0.14)!important;color:#e65100!important;font-weight:900;}

/* Rows */
.wb-rows{overflow-y:auto;max-height:580px;}
.wb-rows::-webkit-scrollbar{width:6px;}
.wb-rows::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:3px;}
.wb-row{border-bottom:1px solid #b8b4a8;min-height:112px;cursor:pointer;transition:filter 0.12s;position:relative;}
.wb-row:last-child{border-bottom:none;}
.wb-row:hover{filter:brightness(0.97);}
.wb-row:active{filter:brightness(0.94);}

/* Status colors */
.wb-row.status-active   { background:rgba(21,101,192,0.05); }
.wb-row.status-delayed  { background:rgba(198,40,40,0.07); }
.wb-row.status-upcoming { background:rgba(46,125,50,0.04); }
.wb-row.status-completed{ background:rgba(0,0,0,0.04); }

.row-gantt{grid-column:1 / -3;position:relative;overflow:hidden;}
.row-biko{grid-column:-3/-2;border-left:2.5px solid #555;display:flex;align-items:center;justify-content:center;}
.row-ko{grid-column:-2/-1;}

/* Separators */
.csep{position:absolute;top:0;bottom:0;width:1px;background:rgba(150,110,50,0.28);pointer-events:none;z-index:1;}
.csep.sun{background:rgba(198,40,40,0.22);}
.csep.sat{background:rgba(21,101,192,0.18);}
.csep.today{width:2px;z-index:5;background:rgba(230,81,0,0.7);}
.today-tag{position:absolute;top:4px;font-size:10px;font-weight:700;color:#e65100;background:rgba(255,255,255,0.93);padding:1px 4px;border-radius:3px;white-space:nowrap;transform:translateX(-50%);pointer-events:none;z-index:6;}

/* Project label — full width top area, horizontal single line */
.plbl{position:absolute;top:0;left:0;right:0;z-index:3;pointer-events:none;
  display:flex;align-items:center;gap:10px;padding:10px 12px 0;flex-wrap:wrap;}
.pname{font-size:18px;font-weight:900;color:#111;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;background:rgba(248,248,242,0.95);padding:3px 9px;
  border-radius:5px;flex-shrink:1;min-width:0;}
.psub{font-size:14px;font-weight:700;color:#333;white-space:nowrap;
  background:rgba(248,248,242,0.88);padding:3px 8px;border-radius:4px;flex-shrink:0;}
.sbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;
  font-size:11px;font-weight:700;flex-shrink:0;line-height:1.4;}
.sb-active{background:#1565c0;color:#fff;} .sb-upcoming{background:#2e7d32;color:#fff;}
.sb-delayed{background:#c62828;color:#fff;} .sb-completed{background:#777;color:#fff;}

/* Action buttons — always visible, touch-sized */
.row-btns{position:absolute;bottom:8px;right:8px;display:flex;gap:6px;z-index:4;}
.row-btn{
  padding:8px 16px;border-radius:8px;border:2px solid #ddd;
  background:rgba(255,255,255,0.96);font-family:inherit;font-size:13px;font-weight:700;
  color:#555;cursor:pointer;white-space:nowrap;transition:all 0.15s;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);min-height:40px;
}
.row-btn:active{transform:scale(0.96);}
.row-btn.btn-detail {border-color:#1565c0;color:#1565c0;background:rgba(21,101,192,0.07);}
.row-btn.btn-schedule{border-color:#2e7d32;color:#2e7d32;background:rgba(46,125,50,0.07);}
.row-btn.btn-report  {border-color:#e65100;color:#e65100;background:rgba(230,81,0,0.07);}
.row-btn.btn-worker  {border-color:#6a1b9a;color:#6a1b9a;background:rgba(106,27,154,0.07);}
.row-btn:hover{filter:brightness(0.92);box-shadow:0 4px 10px rgba(0,0,0,0.15);}

/* Gantt bar */
.gbar{position:absolute;bottom:52px;height:30px;border-radius:5px;z-index:2;overflow:visible;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:height 0.12s,bottom 0.12s;}
.gbar:hover,.gbar:active{height:36px;bottom:49px;box-shadow:0 4px 14px rgba(0,0,0,0.28);z-index:10;}
.gbar-inner{position:absolute;inset:0;border-radius:4px;overflow:hidden;}
.gd{position:absolute;left:0;top:0;bottom:0;border-radius:4px 0 0 4px;}
.gr{position:absolute;top:0;bottom:0;right:0;background:rgba(255,255,255,0.44);background-image:repeating-linear-gradient(-45deg,rgba(255,255,255,0) 0px,rgba(255,255,255,0) 4px,rgba(255,255,255,0.42) 4px,rgba(255,255,255,0.42) 8px);border-radius:0 4px 4px 0;}
.gdiv{position:absolute;top:0;bottom:0;width:2.5px;background:rgba(255,255,255,0.95);z-index:2;}
.gpct{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.65);z-index:3;pointer-events:none;white-space:nowrap;}
.gpct-out{position:absolute;top:50%;left:calc(100% + 5px);transform:translateY(-50%);font-size:12px;font-weight:900;color:#333;white-space:nowrap;z-index:10;pointer-events:none;background:rgba(248,248,242,0.92);padding:1px 4px;border-radius:3px;}
.bc0{background:#1565c0;} .bc0 .gd{background:#2979d0;}
.bc1{background:#00838f;} .bc1 .gd{background:#00acc1;}
.bc2{background:#c62828;} .bc2 .gd{background:#e53935;}
.bc3{background:#2e7d32;} .bc3 .gd{background:#43a047;}
.bc4{background:#6a1b9a;} .bc4 .gd{background:#8e24aa;}
.bc5{background:#546e7a;} .bc5 .gd{background:#6d8a96;}
.bc6{background:#e65100;} .bc6 .gd{background:#f4511e;}
.bc7{background:#00695c;} .bc7 .gd{background:#00897b;}
.gbar.delayed{box-shadow:0 0 0 2px #c62828,0 2px 6px rgba(0,0,0,0.2);}

/* Camera button */
.cam-btn{width:34px;height:34px;border-radius:50%;border:none;background:#c62828;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.35);flex-shrink:0;position:relative;z-index:5;}
.cam-btn::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:2.5px solid rgba(198,40,40,0.55);animation:camring 1.8s ease-in-out infinite;}
@keyframes camring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:0}}
.cam-btn svg{pointer-events:none;}

/* Camera modal */
#camModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9000;align-items:center;justify-content:center;}
.cam-modal-inner{background:#111;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.7);max-width:900px;width:92vw;}
.cam-modal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#1a1a1a;}
#camTitle{color:#fff;font-size:15px;font-weight:700;}
.cam-close{background:none;border:none;color:#aaa;font-size:26px;cursor:pointer;line-height:1;padding:0 4px;}
.cam-close:hover{color:#fff;}
.cam-frame-wrap{position:relative;padding-bottom:56.25%;}
#camFrame{position:absolute;inset:0;width:100%;height:100%;border:none;}

.tooltip{position:fixed;background:#fff;border:1.5px solid #ccc;border-radius:6px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:9999;opacity:0;transition:opacity 0.12s;box-shadow:0 3px 12px rgba(0,0,0,0.12);}
.tooltip.show{opacity:1;}
.tt-n{font-weight:700;color:#111;}.tt-s{font-size:11px;color:#888;margin-top:2px;}
.hint{width:100%;max-width:1480px;text-align:right;padding:4px 12px 0;font-size:11px;font-weight:600;color:#1565c0;animation:blink 2.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@media(max-width:900px){
  .filter-pills{margin-left:0;}body{padding:5px;}
  .row-btn{padding:7px 12px;font-size:12px;}
  .pname{font-size:15px;}
  .psub{font-size:12px;}
  .wb-rows{max-height:70vh;}
}
</style>
</head>

<script>
const P=[
  {id:"KJ-2026-001",name:"鹿児島市役所 本庁舎改修工事",   client:"鹿児島市",          mgr:"田中 太郎",status:"active",   s:"2026-02-10",e:"2026-05-30",prog:45, budget:158000000,spent:68500000, cat:"公共建築",loc:"鹿児島市山下町11-1",   wk:24,cam:"https://www.youtube.com/embed/FPNewYenL8E?autoplay=1",   camLabel:"城山町ライブカメラ"},
  {id:"KJ-2026-002",name:"天文館通り 道路拡幅工事",        client:"鹿児島県",          mgr:"山田 花子",status:"active",   s:"2026-01-15",e:"2026-04-15",prog:68, budget:92000000, spent:61200000, cat:"土木",    loc:"鹿児島市千日町",      wk:18,cam:"https://www.youtube.com/embed/FhziJrI0N3M?autoplay=1",   camLabel:"武発交差点 24hライブカメラ"},
  {id:"KJ-2026-003",name:"桜島フェリーターミナル 耐震補強",client:"鹿児島市船舶部",    mgr:"佐藤 健一",status:"delayed",  s:"2025-11-01",e:"2026-04-14",prog:52, budget:245000000,spent:142000000,cat:"港湾",    loc:"鹿児島市桜島横山町",  wk:32,cam:"https://www.youtube.com/embed/PeElJClXtzE?autoplay=1",   camLabel:"桜島ライブカメラ 近景（2K）"},
  {id:"KJ-2026-004",name:"城山展望台 休憩施設新築",        client:"鹿児島市観光課",    mgr:"中村 美咲",status:"upcoming", s:"2026-04-01",e:"2026-08-31",prog:0,  budget:78000000, spent:0,        cat:"建築",    loc:"鹿児島市城山町",      wk:0, cam:"https://www.youtube.com/embed/Hmmk0eYn0cw?autoplay=1",   camLabel:"鹿児島・桜島ライブカメラ（MBC）"},
  {id:"KJ-2026-005",name:"甲突川 護岸修繕工事",            client:"鹿児島県土木部",    mgr:"鈴木 一郎",status:"active",   s:"2026-03-01",e:"2026-06-30",prog:18, budget:64000000, spent:9800000,  cat:"河川",    loc:"鹿児島市甲突町",      wk:12,cam:"https://www.youtube.com/embed/WknwFmhKRdQ?autoplay=1",   camLabel:"甲突川河口・桜島 天気ライブカメラ"},
  {id:"KJ-2026-006",name:"鴨池運動公園 照明LED化",         client:"鹿児島市",          mgr:"高橋 誠",  status:"completed",s:"2025-12-01",e:"2026-02-28",prog:100,budget:35000000, spent:33200000, cat:"電気設備",loc:"鹿児島市与次郎2丁目", wk:0},
  {id:"KJ-2026-007",name:"谷山駅前 再開発ビル基礎工事",    client:"谷山駅前再開発組合",mgr:"伊藤 大輔",status:"active",   s:"2026-01-20",e:"2026-07-31",prog:30, budget:420000000,spent:118000000,cat:"建築",    loc:"鹿児島市谷山中央1丁目",wk:45,cam:"https://www.youtube.com/embed/OVjQYjngkuQ?autoplay=1",   camLabel:"鹿児島市桜ヶ丘ライブカメラ"},
  {id:"KJ-2026-008",name:"指宿スカイライン 法面補修",       client:"NEXCO西日本",       mgr:"渡辺 裕子",status:"upcoming", s:"2026-04-15",e:"2026-06-15",prog:0,  budget:52000000, spent:0,        cat:"道路",    loc:"鹿児島市田上8丁目",   wk:0, cam:"https://www.youtube.com/embed/Jv2mXz3spds?autoplay=1",   camLabel:"鹿児島市田上台ライブカメラ"},
];
const SL={active:'施工中',upcoming:'着工予定',delayed:'遅延',completed:'完了'};
const DOW=['日','月','火','水','木','金','土'];
const MON=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const TODAY=new Date(2026,2,23);
let view='month',vDate=new Date(2026,2,1),filt='all';

const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const proj=()=>filt==='all'?P:P.filter(p=>p.status===filt);

function cfg(){
  if(view==='week'){
    const d=new Date(vDate),dow=d.getDay();
    const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
    const cols=Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd;});
    const last=cols[6];
    return{type:'week',cols,label:`${cols[0].getFullYear()}年 ${cols[0].getMonth()+1}/${cols[0].getDate()}〜${last.getMonth()+1}/${last.getDate()}（週間）`,sub:false};
  }else if(view==='month'){
    const y=vDate.getFullYear(),m=vDate.getMonth(),days=new Date(y,m+1,0).getDate();
    return{type:'month',cols:Array.from({length:days},(_,i)=>new Date(y,m,i+1)),label:`${y}年 ${MON[m]}`,sub:true};
  }else{
    const y=vDate.getFullYear();
    return{type:'year',cols:Array.from({length:12},(_,i)=>new Date(y,i,1)),label:`${y}年（年間）`,sub:false};
  }
}

function barPos(p,c){
  const pS=pd(p.s),pE=pd(p.e),first=c.cols[0],last=c.cols[c.cols.length-1];
  const end=new Date(last.getFullYear(),last.getMonth(),last.getDate()+1);
  if(pS>=end||pE<first)return null;
  const total=end-first,bS=Math.max(pS.getTime(),first.getTime()),bE=Math.min(pE.getTime()+86400000,end.getTime());
  return{left:(bS-first)/total*100,width:(bE-bS)/total*100};
}

function todayPct(c){
  const first=c.cols[0],last=c.cols[c.cols.length-1];
  const end=new Date(last.getFullYear(),last.getMonth(),last.getDate()+1);
  if(TODAY<first||TODAY>=end)return null;
  return(TODAY.getTime()-first.getTime()+43200000)/(end-first)*100;
}

function sepPcts(c){
  const first=c.cols[0],last=c.cols[c.cols.length-1];
  const end=new Date(last.getFullYear(),last.getMonth(),last.getDate()+1);
  const total=end-first;
  return c.cols.slice(0,-1).map((col,i)=>({pct:(c.cols[i+1]-first)/total*100,dow:c.cols[i+1].getDay()}));
}

function render(){
  const c=cfg();
  document.getElementById('periodLabel').textContent=c.label;
  const tpl=`repeat(${c.cols.length},1fr) 56px 44px`;
  renderHeader(c,tpl);renderRows(c,tpl);
}
const setTpl=(el,tpl)=>{el.style.gridTemplateColumns=tpl;};

function renderHeader(c,tpl){
  const hdr=document.getElementById('wbHeader'),sub=document.getElementById('wbSubHeader');
  hdr.innerHTML='';sub.innerHTML='';setTpl(hdr,tpl);
  const mk=(txt,cls)=>{const d=document.createElement('div');d.className='hc '+cls;d.innerHTML=txt;return d;};
  c.cols.forEach(col=>{
    const dow=col.getDay(),isToday=col.toDateString()===TODAY.toDateString();
    let cls='',txt='';
    if(c.type==='month'){txt=col.getDate();cls=dow===0?'sun':dow===6?'sat':'';}
    else if(c.type==='week'){txt=`${DOW[dow]}<br><span style="font-size:11px;font-weight:500">${col.getMonth()+1}/${col.getDate()}</span>`;cls=dow===0?'sun':dow===6?'sat':'';}
    else{txt=MON[col.getMonth()];}
    if(isToday)cls+=' today-hc';
    hdr.appendChild(mk(txt,cls.trim()));
  });
  hdr.appendChild(mk('備','biko'));hdr.appendChild(mk('考','ko'));
  if(c.sub){
    sub.style.display='';setTpl(sub,tpl);
    c.cols.forEach(col=>{const dow=col.getDay();const el=mk(DOW[dow],dow===0?'sun':dow===6?'sat':'');el.style.fontSize='12px';sub.appendChild(el);});
    sub.appendChild(mk('','biko'));sub.appendChild(mk('','ko'));
  }else sub.style.display='none';
}

function renderRows(c,tpl){
  const ct=document.getElementById('wbRows');ct.innerHTML='';
  const list=proj(),seps=sepPcts(c),tdp=todayPct(c);
  if(!list.length){
    const e=document.createElement('div');e.style.cssText='padding:36px;text-align:center;color:#999;font-size:15px;';
    e.textContent='該当する工事がありません';ct.appendChild(e);return;
  }
  list.forEach((p)=>{
    const ci=P.indexOf(p)%8;
    const row=document.createElement('div');
    row.className=`wb-row status-${p.status}`;
    setTpl(row,tpl);
    row.onclick=()=>location.href=`kintone.html?id=${p.id}`;

    const ga=document.createElement('div');ga.className='row-gantt';
    seps.forEach(s=>{const l=document.createElement('div');l.className='csep'+(s.dow===0?' sun':s.dow===6?' sat':'');l.style.left=s.pct+'%';ga.appendChild(l);});
    if(tdp!==null){
      const tl=document.createElement('div');tl.className='csep today';tl.style.left=tdp+'%';ga.appendChild(tl);
      const tt=document.createElement('div');tt.className='today-tag';tt.style.left=tdp+'%';tt.textContent='今日';ga.appendChild(tt);
    }

    const pl=document.createElement('div');pl.className='plbl';
    pl.innerHTML=`<span class="pname">${p.name}</span><span class="sbadge sb-${p.status}">${SL[p.status]}</span><span class="psub">担当: ${p.mgr}</span><span class="psub">工期: ${p.s}〜${p.e}</span>`;
    ga.appendChild(pl);

    // Action buttons
    const btns=document.createElement('div');btns.className='row-btns';
    [{label:'詳細',tab:'detail',cls:'btn-detail'},{label:'工程表',tab:'schedule',cls:'btn-schedule'},{label:'日報',tab:'report',cls:'btn-report'},{label:'作業員',tab:'worker',cls:'btn-worker'}].forEach(({label,tab,cls})=>{
      const btn=document.createElement('button');
      btn.className=`row-btn ${cls}`;
      btn.textContent=label;
      btn.onclick=ev=>{ev.stopPropagation();location.href=`kintone.html?id=${p.id}&tab=${tab}`;};
      btns.appendChild(btn);
    });
    ga.appendChild(btns);

    const bp=barPos(p,c);
    if(bp){
      const bar=document.createElement('div');
      bar.className=`gbar bc${ci}${p.status==='delayed'?' delayed':''}`;
      bar.style.left=bp.left+'%';bar.style.width=Math.max(bp.width,0.4)+'%';
      const inner=document.createElement('div');inner.className='gbar-inner';
      if(p.prog>0){const gd=document.createElement('div');gd.className='gd';gd.style.width=p.prog+'%';inner.appendChild(gd);}
      if(p.prog<100){const gr=document.createElement('div');gr.className='gr';gr.style.left=p.prog+'%';inner.appendChild(gr);}
      if(p.prog>0&&p.prog<100){const dv=document.createElement('div');dv.className='gdiv';dv.style.left=p.prog+'%';inner.appendChild(dv);}
      bar.appendChild(inner);
      const pct=document.createElement('span');pct.className=bp.width<8?'gpct-out':'gpct';pct.textContent=p.prog+'%';bar.appendChild(pct);
      bar.onmouseenter=ev=>showTip(ev,p);bar.onmouseleave=hideTip;
      bar.onclick=ev=>{ev.stopPropagation();location.href=`kintone.html?id=${p.id}&tab=schedule`;};
      ga.appendChild(bar);
    }
    row.appendChild(ga);

    const bc=document.createElement('div');bc.className='row-biko';
    if(p.cam){
      const cb=document.createElement('button');cb.className='cam-btn';
      cb.title=p.name+'　'+p.camLabel;
      cb.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M15 10l4.553-2.529A1 1 0 0121 8.44v7.12a1 1 0 01-1.447.889L15 14v-4z" fill="#fff"/><rect x="2" y="6" width="13" height="13" rx="2" fill="#fff"/></svg>';
      cb.onclick=ev=>{ev.stopPropagation();openCam(p.cam,p.name,p.camLabel);};
      bc.appendChild(cb);
    }
    row.appendChild(bc);
    const kc=document.createElement('div');kc.className='row-ko';row.appendChild(kc);
    ct.appendChild(row);
  });
}

function showTip(ev,p){
  const t=document.getElementById('tooltip');
  const pc=p.status==='delayed'?'#c62828':p.status==='completed'?'#888':'#2e7d32';
  t.innerHTML=`<div class="tt-n">${p.name}</div><div class="tt-s">${p.mgr} ｜ <span style="color:${pc};font-weight:700">${SL[p.status]}</span> ｜ 進捗 <b>${p.prog}%</b></div><div class="tt-s">${p.s} 〜 ${p.e}</div><div class="tt-s" style="color:#2e7d32;margin-top:3px">▶ クリックで工程表へ</div>`;
  t.classList.add('show');mvTip(ev);
}
function mvTip(ev){const t=document.getElementById('tooltip');t.style.left=(ev.clientX+14)+'px';t.style.top=(ev.clientY-8)+'px';}
function hideTip(){document.getElementById('tooltip').classList.remove('show');}
document.addEventListener('mousemove',ev=>{if(document.getElementById('tooltip').classList.contains('show'))mvTip(ev);});

function openCam(url,name,label){
  document.getElementById('camTitle').innerHTML=
    `📹 ${name}&nbsp;&nbsp;<span style="font-size:12px;opacity:0.7;font-weight:400">${label||'現場ライブカメラ'}</span>`;
  document.getElementById('camFrame').src=url;
  document.getElementById('camModal').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeCam(){
  document.getElementById('camModal').style.display='none';
  document.getElementById('camFrame').src='';
  document.body.style.overflow='';
}
document.getElementById('camModal').addEventListener('click',ev=>{if(ev.target===document.getElementById('camModal'))closeCam();});

document.getElementById('prevBtn').onclick=()=>{if(view==='week')vDate.setDate(vDate.getDate()-7);else if(view==='month')vDate.setMonth(vDate.getMonth()-1);else vDate.setFullYear(vDate.getFullYear()-1);render();};
document.getElementById('nextBtn').onclick=()=>{if(view==='week')vDate.setDate(vDate.getDate()+7);else if(view==='month')vDate.setMonth(vDate.getMonth()+1);else vDate.setFullYear(vDate.getFullYear()+1);render();};
document.querySelectorAll('.vt').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.vt').forEach(x=>x.classList.remove('active'));b.classList.add('active');view=b.dataset.v;render();};});
document.querySelectorAll('.pill').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');filt=b.dataset.f;render();};});

function tick(){const n=new Date();document.getElementById('clock').textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
window.addEventListener('resize',render);
render();tick();setInterval(tick,30000);
</script>
</body>
