<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif; background:#f0f2f5; min-height:100vh; }

/* App shell */
.app-header { background:#1565c0; color:#fff; padding:12px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
.back-btn { background:rgba(255,255,255,0.18); border:none; color:#fff; padding:7px 14px; border-radius:7px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:background 0.12s; white-space:nowrap; }
.back-btn:hover { background:rgba(255,255,255,0.28); }
.hdr-info { flex:1; min-width:0; }
.hdr-name { font-size:18px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hdr-id { font-size:12px; opacity:0.75; margin-top:2px; }
.status-badge { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; white-space:nowrap; }
.sb-active   { background:#43a047; color:#fff; }
.sb-delayed  { background:#e53935; color:#fff; }
.sb-upcoming { background:#fff; color:#1565c0; }
.sb-completed{ background:rgba(255,255,255,0.3); color:#fff; }

/* Meta bar */
.meta-bar { background:#1976d2; color:rgba(255,255,255,0.92); padding:8px 20px; display:flex; gap:20px; flex-wrap:wrap; font-size:12px; }
.meta-item { display:flex; align-items:center; gap:5px; }
.meta-label { opacity:0.7; }
.meta-val { font-weight:700; }

/* Tab nav */
.tab-nav { background:#fff; border-bottom:2px solid #e0e0e0; display:flex; padding:0 20px; }
.tab-btn { padding:14px 20px; border:none; background:none; font-family:inherit; font-size:14px; font-weight:700; color:#888; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.15s; white-space:nowrap; }
.tab-btn:hover { color:#1565c0; }
.tab-btn.active { color:#1565c0; border-bottom-color:#1565c0; }

/* Panes */
.tab-pane { display:none; padding:20px; max-width:1200px; margin:0 auto; }
.tab-pane.active { display:block; }

/* Detail pane */
.progress-card { background:#fff; border-radius:10px; padding:18px 20px; box-shadow:0 1px 4px rgba(0,0,0,0.08); margin-bottom:16px; }
.progress-card h3 { font-size:13px; color:#888; font-weight:600; margin-bottom:10px; }
.prog-bar-wrap { background:#e0e0e0; border-radius:8px; height:20px; overflow:hidden; margin-bottom:6px; }
.prog-bar-fill { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:8px; font-size:11px; font-weight:700; color:#fff; transition:width 0.5s; }
.prog-label { display:flex; justify-content:space-between; font-size:12px; color:#666; }
.info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.info-card { background:#fff; border-radius:10px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.info-card-label { font-size:11px; color:#999; font-weight:600; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em; }
.info-card-val { font-size:15px; font-weight:700; color:#222; }
.section-title { font-size:14px; font-weight:800; color:#333; margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
.section-title::before { content:''; display:block; width:4px; height:16px; background:#1565c0; border-radius:2px; }
.cam-section { background:#fff; border-radius:10px; padding:18px 20px; box-shadow:0 1px 4px rgba(0,0,0,0.08); display:flex; align-items:center; gap:16px; }
.cam-live-btn { width:48px; height:48px; border-radius:50%; border:none; background:#c62828; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; box-shadow:0 3px 10px rgba(198,40,40,0.4); }
.cam-live-btn::before { content:''; position:absolute; inset:-6px; border-radius:50%; border:2.5px solid rgba(198,40,40,0.45); animation:camring 1.8s ease-in-out infinite; }
@keyframes camring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:0}}
.cam-info h4 { font-size:14px; font-weight:700; color:#222; }
.cam-info p { font-size:12px; color:#888; margin-top:2px; }

/* Schedule pane */
.schedule-header { display:grid; gap:0; margin-bottom:2px; }
.sch-col-label { display:grid; grid-template-columns:180px 90px 90px 1fr 80px; gap:0; background:#e8eaf6; border-radius:6px 6px 0 0; font-size:11px; font-weight:700; color:#555; }
.sch-col-label div { padding:8px 10px; border-right:1px solid #ddd; }
.sch-col-label div:last-child { border-right:none; }
.phase-row { display:grid; grid-template-columns:180px 90px 90px 1fr 80px; gap:0; border:1px solid #e8e8e8; border-top:none; background:#fff; cursor:pointer; transition:background 0.12s; }
.phase-row:first-child { border-top:1px solid #e8e8e8; }
.phase-row:hover { background:#f5f8ff; }
.phase-row.expanded { background:#f0f4ff; }
.phase-cell { padding:10px 10px; border-right:1px solid #e8e8e8; font-size:13px; display:flex; align-items:center; }
.phase-cell:last-child { border-right:none; }
.phase-name { font-weight:700; gap:6px; }
.phase-name .expand-icon { font-size:10px; color:#1565c0; transition:transform 0.15s; }
.phase-row.expanded .expand-icon { transform:rotate(90deg); }
.phase-date { font-size:12px; color:#555; }
.phase-chart { position:relative; height:36px; background:#f5f5f5; border-radius:4px; overflow:hidden; }
.phase-bar { position:absolute; top:4px; height:18px; border-radius:3px; }
.phase-bar-done { position:absolute; top:4px; left:0; height:18px; border-radius:3px 0 0 3px; opacity:0.7; }
.phase-status-cell { justify-content:center; }
.phase-status { padding:3px 9px; border-radius:4px; font-size:11px; font-weight:700; white-space:nowrap; }
.ps-done { background:#e8f5e9; color:#2e7d32; }
.ps-active { background:#e3f2fd; color:#1565c0; }
.ps-plan { background:#f5f5f5; color:#888; }
.ps-delayed { background:#ffebee; color:#c62828; }

/* WBS sub-rows */
.wbs-container { display:none; background:#f8f9ff; border:1px solid #e0e7ff; border-top:none; }
.wbs-container.open { display:block; }
.wbs-header-row { display:grid; grid-template-columns:30px 160px 90px 90px 1fr 80px; gap:0; background:#ede7f6; font-size:11px; font-weight:700; color:#555; }
.wbs-header-row div { padding:6px 8px; border-right:1px solid #ddd; }
.wbs-row { display:grid; grid-template-columns:30px 160px 90px 90px 1fr 80px; gap:0; border-top:1px solid #e8e8e8; background:#fff; }
.wbs-cell { padding:8px 8px; border-right:1px solid #e8e8e8; font-size:12px; display:flex; align-items:center; }
.wbs-cell:last-child { border-right:none; }
.wbs-indent { justify-content:center; color:#bbb; font-size:14px; }

/* Timeline ruler */
.timeline-ruler { position:relative; height:22px; background:#eef0f4; margin-bottom:0; border-radius:4px 4px 0 0; overflow:hidden; }
.timeline-mark { position:absolute; top:0; bottom:0; width:1px; background:#ccc; }
.timeline-mark span { position:absolute; top:4px; left:2px; font-size:9px; color:#888; white-space:nowrap; }
.today-line { position:absolute; top:0; bottom:0; width:2px; background:rgba(230,81,0,0.6); z-index:2; }

/* Report pane */
.report-actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.btn-primary { padding:8px 18px; background:#1565c0; color:#fff; border:none; border-radius:8px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:background 0.12s; }
.btn-primary:hover { background:#1976d2; }
.report-count { font-size:13px; color:#888; }
.report-count b { color:#333; }
table.data-table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08); font-size:13px; }
table.data-table thead { background:#f5f5f5; }
table.data-table th { padding:10px 12px; text-align:left; font-weight:700; color:#555; font-size:12px; border-bottom:2px solid #e0e0e0; white-space:nowrap; }
table.data-table td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
table.data-table tr:last-child td { border-bottom:none; }
table.data-table tr:hover td { background:#f8f9ff; }
.weather-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
.w-fine { background:#fff9e6; color:#f57f17; }
.w-cloud { background:#f5f5f5; color:#555; }
.w-rain { background:#e3f2fd; color:#1565c0; }
.alert-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; background:#ffebee; color:#c62828; }
.note-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; background:#e8f5e9; color:#2e7d32; }

/* Worker pane */
.worker-actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.worker-search { padding:8px 12px; border:1.5px solid #ccc; border-radius:8px; font-family:inherit; font-size:13px; width:220px; outline:none; }
.worker-search:focus { border-color:#1565c0; }
.worker-count { font-size:13px; color:#888; }
.cred-ok { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; background:#e8f5e9; color:#2e7d32; }
.cred-exp { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; background:#fff8e1; color:#f57f17; }
.cred-ng { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; background:#ffebee; color:#c62828; }
.avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }

/* Camera modal */
#camModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9000;align-items:center;justify-content:center;}
.cam-modal-inner{background:#111;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.7);max-width:900px;width:92vw;}
.cam-modal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#1a1a1a;}
#camTitle{color:#fff;font-size:15px;font-weight:700;}
.cam-close{background:none;border:none;color:#aaa;font-size:26px;cursor:pointer;line-height:1;padding:0 4px;}
.cam-close:hover{color:#fff;}
.cam-frame-wrap{position:relative;padding-bottom:56.25%;}
#camFrame{position:absolute;inset:0;width:100%;height:100%;border:none;}
</style>
</head>

// Build schedule pane
function buildSchedule(){
  const phases=getPhases(p.id);
  const pStart=pd(p.s),pEnd=pd(p.e);
  const total=pEnd-pStart+86400000;
  const barPct=(s,e)=>{
    const start=Math.max(pd(s)-pStart,0)/total*100;
    const width=(pd(e)-pd(s)+86400000)/total*100;
    return{left:start.toFixed(1),width:Math.min(width,100-start).toFixed(1)};
  };
  const phaseCols=['#1565c0','#00838f','#546e7a','#2e7d32','#6a1b9a','#e65100','#c62828','#00695c'];
  const statusLabel={done:'完了',active:'施工中',plan:'着工予定',delayed:'遅延'};
  const statusCls={done:'ps-done',active:'ps-active',plan:'ps-plan',delayed:'ps-delayed'};

  let rows='';
  phases.forEach((ph,i)=>{
    const bp=barPct(ph.s,ph.e);
    const color=phaseCols[i%8];
    const hasWbs=ph.wbs&&ph.wbs.length>0;
    rows+=`
    <div class="phase-row${ph.status==='active'?' expanded':''}" onclick="toggleWbs(this,'wbs-${i}')">
      <div class="phase-cell phase-name">${hasWbs?`<span class="expand-icon${ph.status==='active'?' active':''}">▶</span>`:''}${ph.name}</div>
      <div class="phase-cell phase-date">${ph.s.slice(5)}</div>
      <div class="phase-cell phase-date">${ph.e.slice(5)}</div>
      <div class="phase-cell" style="padding:4px 8px;">
        <div class="phase-chart" style="width:100%">
          <div class="phase-bar-done" style="left:${bp.left}%;width:${(parseFloat(bp.width)*ph.prog/100).toFixed(1)}%;background:${color};opacity:0.9"></div>
          <div class="phase-bar" style="left:${bp.left}%;width:${bp.width}%;border:2px solid ${color};background:transparent;border-radius:3px;"></div>
        </div>
      </div>
      <div class="phase-cell phase-status-cell"><span class="phase-status ${statusCls[ph.status]||'ps-plan'}">${statusLabel[ph.status]||ph.status}</span></div>
    </div>`;
    if(hasWbs){
      let wbsRows='<div class="wbs-header-row"><div></div><div>作業内容</div><div>開始日</div><div>終了日</div><div>担当 / 進捗チャート</div><div>進捗</div></div>';
      ph.wbs.forEach(w=>{
        const wb=barPct(w.s,w.e);
        const wPct=Math.round((pd(w.s)-pd(ph.s))/(pd(ph.e)-pd(ph.s)+86400000)*100);
        wbsRows+=`<div class="wbs-row">
          <div class="wbs-cell wbs-indent">└</div>
          <div class="wbs-cell" style="font-weight:600">${w.name}</div>
          <div class="wbs-cell phase-date">${w.s.slice(5)}</div>
          <div class="wbs-cell phase-date">${w.e.slice(5)}</div>
          <div class="wbs-cell" style="padding:4px 8px;flex-direction:column;align-items:flex-start;gap:2px;">
            <span style="font-size:11px;color:#888">${w.worker}</span>
            <div class="phase-chart" style="width:100%;height:12px;">
              <div style="position:absolute;top:0;left:${wb.left}%;width:${(parseFloat(wb.width)*w.prog/100).toFixed(1)}%;height:12px;background:${color};border-radius:2px;opacity:0.85"></div>
              <div style="position:absolute;top:0;left:${wb.left}%;width:${wb.width}%;height:12px;border:1.5px solid ${color};border-radius:2px;"></div>
            </div>
          </div>
          <div class="wbs-cell" style="justify-content:center;font-weight:700;color:${w.prog===100?'#2e7d32':color}">${w.prog}%</div>
        </div>`;
      });
      rows+=`<div class="wbs-container${ph.status==='active'?' open':''}" id="wbs-${i}">${wbsRows}</div>`;
    }
  });

  document.getElementById('pane-schedule').innerHTML=`
  <div style="margin-bottom:12px;font-size:13px;color:#555;">工期: <b>${p.s}</b> 〜 <b>${p.e}</b>　（チャートは工期全体に対する相対位置）</div>
  <div class="sch-col-label">
    <div>工事名</div><div>開始日</div><div>終了日</div><div>進捗チャート</div><div style="text-align:center">状況</div>
  </div>
  ${rows}
  `;
}

function toggleWbs(rowEl,wbsId){
  const wbs=document.getElementById(wbsId);
  if(!wbs)return;
  const open=wbs.classList.toggle('open');
  rowEl.classList.toggle('expanded',open);
}

  let rows=nippo.map(n=>`
    <tr>
      <td style="white-space:nowrap;font-weight:600">${n.date}</td>
      <td>${n.reporter}</td>
      <td style="max-width:320px">${n.content}</td>
      <td><span class="weather-badge ${wCls[n.weather]}">${wIco[n.weather]} ${n.weather==='fine'?'晴れ':n.weather==='cloud'?'曇り':'雨'}</span></td>
      <td style="text-align:center;font-weight:700">${n.count}名</td>
      <td>${n.note==='alert'?'<span class="alert-badge">⚠ 材料不足</span>':n.note==='mat'?'<span class="note-badge">対応済</span>':''}</td>
    </tr>`).join('');
  if(!rows)rows='<tr><td colspan="6" style="text-align:center;color:#999;padding:24px;">日報データがありません</td></tr>';
  document.getElementById('pane-report').innerHTML=`
  <div class="report-actions">
    <button class="btn-primary">＋ 日報を書く</button>
    <span class="report-count">全 <b>${nippo.length}</b> 件</span>

  <table class="data-table">
    <thead><tr><th>日付</th><th>報告者</th><th>作業内容</th><th>天候</th><th>人数</th><th>特記事項</th></tr></thead>

}

}

function openCam(url,name,label){
  document.getElementById('camTitle').innerHTML=
    `📹 ${name}&nbsp;&nbsp;<span style="font-size:12px;opacity:0.7;font-weight:400">${label||'現場ライブカメラ'}</span>`;
  document.getElementById('camFrame').src=url;
  document.getElementById('camModal').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeCam(){
  document.getElementById('camModal').style.display='none';
  document.getElementById('camFrame').src='';
  document.body.style.overflow='';
}
document.getElementById('camModal').addEventListener('click',ev=>{if(ev.target===document.getElementById('camModal'))closeCam();});
</script>
